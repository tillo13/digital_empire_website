<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="40%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a0000"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0000"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#ff0000" stroke-width="0.5"/>
    <line x1="1200" y1="0" x2="0" y2="630" stroke="#ff0000" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#ff0000" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#ff0000" stroke-width="0.5"/>
  </g>

  <!-- Red accent lines -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#redGlow)"/>
  <rect x="0" y="626" width="1200" height="4" fill="url(#redGlow)"/>

  <!-- YouTube play button icon -->
  <g transform="translate(540, 160)" filter="url(#glow)">
    <path d="M83.7 9.4C82.6 5.7 79.8 2.8 76.1 1.8C69.3 0 42.9 0 42.9 0C42.9 0 16 0 9.4 1.8C5.7 2.8 2.8 5.7 1.8 9.4C0 16 0 30 0 30C0 30 0 44 1.8 50.6C2.8 54.3 5.7 57.2 9.4 58.2C16 60 42.9 60 42.9 60C42.9 60 69.3 60 76.1 58.2C79.8 57.2 82.6 54.3 83.7 50.6C85.5 44 85.5 30 85.5 30C85.5 30 85.5 16 83.7 9.4Z" fill="#FF0000"/>
    <path d="M34.3 42.9L56.6 30L34.3 17.1V42.9Z" fill="white"/>
  </g>

  <!-- Main title -->
  <text x="600" y="300" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="64" fill="white" letter-spacing="2">
    Digital Empire Network
  </text>

  <!-- Tagline -->
  <text x="600" y="360" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="28" fill="#cccccc">
    Premium YouTube Gaming Network
  </text>

  <!-- Stats bar -->
  <g transform="translate(200, 420)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="22" fill="#ff0000">3.5M+</text>
    <text x="0" y="24" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="14" fill="#999">Subscribers</text>

    <text x="250" y="0" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="22" fill="#ff0000">500M+</text>
    <text x="250" y="24" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="14" fill="#999">Total Views</text>

    <text x="500" y="0" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="22" fill="#ff0000">7</text>
    <text x="500" y="24" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="14" fill="#999">Channels</text>

    <text x="650" y="0" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="22" fill="#ff0000">Since 2011</text>
    <text x="650" y="24" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="14" fill="#999">Family-Friendly Gaming</text>
  </g>

  <!-- Domain -->
  <text x="600" y="560" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="20" fill="#666">
    digitalempiretv.com
  </text>
</svg>
